function drawArrow(x, y, width, height, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x + width/2, y-height);           // tip
  ctx.lineTo(x + width, y);    // right bottom
  ctx.lineTo(x, y);            // left bottom
  ctx.closePath();
  ctx.fill();
}

// --- Start Song ---
function startSong(songId) {
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";
  currentSong = songs[songId];
  audio = new Audio(currentSong.audioSrc);
  audio.play();
  startTime = performance.now();
  notes = [];
  score = 0;
  requestAnimationFrame(gameLoop);
}

// --- Draw Game ---
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for (let i=0;i<lanes;i++) {
    const color = pressed[i] ? "white" : "gray";
    drawArrow(i*laneWidth+10, canvas.height-20, laneWidth-20, 40, color);
  }

  const hitY = canvas.height - 50;
  const travelTime = 10000 /(currentSong.NOTESPEED);
  const pixelsPerMs = hitY / travelTime;
  const elapsed = performance.now() - startTime;

  notes.forEach(note => {
    const color = laneColors[note.lane];
    if (note.type === "tap") {
      drawArrow(note.lane * laneWidth + 10, note.y, laneWidth-20, 40, color);
    } else if (note.type === "hold") {
      const startY = hitY - (note.startTime - elapsed) * pixelsPerMs;
      const endY   = hitY - (note.endTime   - elapsed) * pixelsPerMs;
      ctx.fillStyle = color;
      ctx.fillRect(note.lane * laneWidth + 10, startY, laneWidth - 20, endY - startY);
    }
  });

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Score: "+score,10,30);
}

function update() {
  const now = performance.now();
  const elapsed = now - startTime;
  const hitY = canvas.height-20; 
  const travelTime = 10000 / currentSong.NOTESPEED;      
  const pixelsPerMs = hitY / travelTime;

  currentSong.notesData.forEach(nd => {
    if (nd.spawned === undefined) {
      if (nd.type === "tap" && elapsed >= nd.time - travelTime) {
        notes.push({ type:"tap", lane: nd.lane, targetTime: nd.time });
        nd.spawned = true;
      }
      if (nd.type === "hold" && elapsed >= nd.startTime - travelTime) {
        notes.push({ type:"hold", lane: nd.lane, starttime: nd.startTime, endTime: nd.endTime, active:false });
        nd.spawned = true;
      }
    }
  });

  notes.forEach(note => {
    if (note.type === "tap") {
      const timeToTarget = note.targetTime - elapsed;
      note.y = hitY - timeToTarget * pixelsPerMs;
    }
  });


  for (let i = notes.length - 1; i >= 0; i--) {
    const note = notes[i];
    if (note.type === "tap" && note.y > canvas.height) {
      score -= 5;
      notes.splice(i, 1);
    }
    if (note.type === "hold" && elapsed > note.endTime + 200) {
 
      if (!note.completed) {
        score -= 5;
      }
      notes.splice(i,1);
    }
  }
}

// --- Input ---
document.addEventListener("keypressed", e => {
  const lane = keys.indexOf(e.key);
  if (lane !== -1) {
    pressed[lane] = true;
    const now = performance.now() - startTime; 

    for (let i = 0; i < notes.length; i++) {
      const note = notes[i];
      if (note.lane === lane) {
        if (note.type === "tap") {
          const diff = Math.abs(now - note.targetTime); 
          if (diff < 50) {    
            score += 50;
            notes.splice(i, 1);
            break;
          } else if (diff < 100) {  
            score += 30;
            notes.splice(i, 1);
            break;
          } else if (diff < 150) {  
            score += 10;
            notes.splice(i, 1);
            break;
          }
        } else if (note.type === "hold") {
          const diff = Math.abs(now - note.startTime);
          if (diff < 150) {
            note.active = true; 
          }
        }
      }
    }
  }
});

document.addEventListener("keyup", e => {
  const lane = keys.indexOf(e.key);
  if (lane !== -1) {
    pressed[lane] = false;
    const now = performance.now() - startTime;
    for (let note of notes) {
      if (note.lane === lane && note.type === "hold" && note.active) {
        if (now >= note.endTime - 150) {
          score += 50; 
          note.completed = true;
        } else {
          score -= 5; 
        }
        note.active = false;
      }
    }
  }
});

// --- Game Loop ---
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
